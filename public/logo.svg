<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="100%" height="100%">
  <defs>
    <style>
      .logo-color {
        fill: #004b87;
      }
      .logo-stroke {
        stroke: #004b87;
        stroke-width: 25;
        fill: none;
        stroke-linecap: butt;
        stroke-linejoin: miter;
        stroke-miterlimit: 4;
      }
      .title {
        font-family: 'Montserrat', 'Helvetica Neue', 'Arial Black', sans-serif;
        font-size: 42px;
        font-weight: 900;
        letter-spacing: 2px;
      }
      .subtitle {
        font-family: 'Montserrat', 'Helvetica Neue', Arial, sans-serif;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 8px;
      }
    </style>
  </defs>

  <polyline class="logo-stroke" points="100,202.5 100,100 150,62.5" />

  <polyline class="logo-stroke" points="145,66.25 200,25 300,100 300,190 147.5,190 147.5,100" />

  <rect class="logo-color" x="135" y="20" width="25" height="90" />

  <rect class="logo-color" x="210" y="100" width="24" height="24" />

  <text class="logo-color title" x="200" y="255" text-anchor="middle">THE HOUSE</text>
  <text class="logo-color subtitle" x="204" y="285" text-anchor="middle">REMODELACIONES</text>
</svg>
